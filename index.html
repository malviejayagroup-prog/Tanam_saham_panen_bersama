<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Donasi — Kembali ke Akar · Bahula Tani Nusantara</title>
<link href="https://fonts.googleapis.com/css2?family=Amiri:ital,wght@0,400;0,700;1,400&family=Cormorant+Garamond:ital,wght@0,300;0,600;0,700;1,400;1,600&family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet">
<style>
/* ══════════════════════════════════════════════════════
   BAHULA TANI NUSANTARA — ULTRA LUXURY LIVING DARK THEME
   Latar Hidup · Partikel Emas · Cahaya Bergerak
══════════════════════════════════════════════════════ */
:root{
  --bg0:#000000; --bg1:#06060a; --bg2:#0d0d14; --bg3:#111118;
  --gold1:#a0700a; --gold2:#c9920d; --gold3:#e8b830; --gold4:#f7d96a; --gold5:#fff3b0;
  --rose:#8b3a1a; --rose2:#c4581e;
  --text:#f0e4c0; --dim:#c4a060; --ghost:#6a5a30;
  --shimmer:linear-gradient(105deg,#7a5000 0%,#c9920d 30%,#f7d96a 50%,#c9920d 70%,#7a5000 100%);
  --shimmer2:linear-gradient(105deg,#5a3800 0%,#a0700a 35%,#fff3b0 50%,#a0700a 65%,#5a3800 100%);
  --glow:rgba(232,184,48,.14);
}

*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;}
html{scroll-behavior:smooth;}
body{
  background:var(--bg0);
  font-family:'DM Sans',sans-serif;
  color:var(--text);
  overflow-x:hidden;
  cursor:default;
}

/* ══ CANVAS PARTIKEL GLOBAL ══ */
#particleCanvas{
  position:fixed;top:0;left:0;width:100%;height:100%;
  pointer-events:none;z-index:0;opacity:.6;
}

/* ══ ANIMASI KEYFRAMES ══ */
@keyframes shimmer{0%{background-position:200% center;}100%{background-position:-200% center;}}
@keyframes rise{from{opacity:0;transform:translateY(24px);}to{opacity:1;transform:translateY(0);}}
@keyframes floatY{0%,100%{transform:translateY(0);}50%{transform:translateY(-12px);}}
@keyframes breathe{0%,100%{opacity:.4;transform:scale(1);}50%{opacity:.7;transform:scale(1.08);}}
@keyframes scrollBounce{0%,100%{transform:translateY(0);}50%{transform:translateY(9px);}}
@keyframes pulse{0%{transform:translate(-50%,-50%) scale(1);opacity:.8;}100%{transform:translate(-50%,-50%) scale(2.5);opacity:0;}}
@keyframes glowRing{0%,100%{box-shadow:0 0 20px rgba(232,184,48,.1),inset 0 0 20px rgba(232,184,48,.04);}50%{box-shadow:0 0 50px rgba(232,184,48,.25),inset 0 0 30px rgba(232,184,48,.08);}}
@keyframes textFlicker{0%,90%,100%{opacity:1;}91%,94%{opacity:.85;}}
@keyframes rotateSlow{from{transform:rotate(0deg);}to{transform:rotate(360deg);}}
@keyframes scanline{0%{transform:translateY(-100%);}100%{transform:translateY(100vh);}}

/* ══ UTILITY ══ */
.gold-text{
  background:var(--shimmer);background-size:200% auto;
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;
  background-clip:text;animation:shimmer 4s linear infinite;
}
.reveal{opacity:0;transform:translateY(18px);transition:opacity .8s ease,transform .8s ease;}
.reveal.visible{opacity:1;transform:translateY(0);}
.eyebrow{
  display:inline-flex;align-items:center;gap:6px;font-size:10px;font-weight:700;
  text-transform:uppercase;letter-spacing:3px;margin-bottom:14px;
  background:var(--shimmer);background-size:200% auto;
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;
  background-clip:text;animation:shimmer 4s linear infinite;
}
.mission-h{
  font-family:'Cormorant Garamond',serif;
  font-size:clamp(22px,4vw,44px);font-weight:700;
  color:var(--text);line-height:1.12;margin-bottom:20px;
}
.mission-h em{
  font-style:italic;
  background:var(--shimmer);background-size:200% auto;
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;
  background-clip:text;animation:shimmer 4s linear infinite;
}
.mission-p{font-size:15px;line-height:1.95;color:var(--dim);max-width:600px;margin:0 auto 48px;}

/* ══ SEKSI PEMISAH ══ */
.gold-line{height:1px;background:linear-gradient(90deg,transparent,var(--gold2),var(--gold4),var(--gold2),transparent);}

/* ══ LATAR HIDUP — AURORA LAYER ══ */
.aurora-bg{
  position:fixed;top:0;left:0;width:100%;height:100%;
  pointer-events:none;z-index:0;overflow:hidden;
}
.aurora-bg .a1{
  position:absolute;width:80vw;height:80vw;border-radius:50%;
  background:radial-gradient(circle,rgba(180,130,10,.06) 0%,transparent 70%);
  top:-20%;left:-10%;animation:floatY 12s ease-in-out infinite;
}
.aurora-bg .a2{
  position:absolute;width:60vw;height:60vw;border-radius:50%;
  background:radial-gradient(circle,rgba(100,60,180,.04) 0%,transparent 70%);
  bottom:-10%;right:-5%;animation:floatY 15s ease-in-out infinite reverse;
}
.aurora-bg .a3{
  position:absolute;width:40vw;height:40vw;border-radius:50%;
  background:radial-gradient(circle,rgba(200,140,20,.05) 0%,transparent 70%);
  top:40%;left:60%;animation:floatY 18s ease-in-out infinite 3s;
}

/* ══ HERO ══ */
.hero{
  min-height:100vh;background:transparent;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  padding:80px 24px 100px;text-align:center;
  position:relative;overflow:hidden;z-index:1;
}
/* Radial vignette */
.hero::before{
  content:'';position:absolute;inset:0;
  background:
    radial-gradient(ellipse 100% 100% at 50% 50%,transparent 30%,rgba(0,0,0,.6) 100%),
    radial-gradient(ellipse 60% 40% at 50% 60%,rgba(232,184,48,.07),transparent);
  pointer-events:none;z-index:0;
}
/* Decorative border ring */
.hero::after{
  content:'';position:absolute;
  width:min(600px,90vw);height:min(600px,90vw);
  border-radius:50%;
  border:1px solid rgba(232,184,48,.06);
  top:50%;left:50%;transform:translate(-50%,-50%);
  pointer-events:none;z-index:0;
  animation:breathe 8s ease-in-out infinite;
}
.hero-ring2{
  position:absolute;
  width:min(800px,110vw);height:min(800px,110vw);
  border-radius:50%;
  border:1px solid rgba(232,184,48,.03);
  top:50%;left:50%;transform:translate(-50%,-50%);
  pointer-events:none;z-index:0;
  animation:breathe 12s ease-in-out infinite 2s;
}
.hero-inner{position:relative;z-index:2;max-width:700px;}
.bismillah{
  font-family:'Amiri',serif;font-size:clamp(18px,3.5vw,28px);
  letter-spacing:5px;margin-bottom:30px;
  background:var(--shimmer2);background-size:200% auto;
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;
  background-clip:text;animation:shimmer 6s linear infinite,rise .9s ease both;
  text-shadow:none;
}
.badge-org{
  display:inline-flex;align-items:center;gap:7px;
  border:1px solid rgba(232,184,48,.3);
  background:rgba(232,184,48,.05);
  backdrop-filter:blur(10px);
  border-radius:40px;padding:6px 20px;
  font-size:10px;font-weight:700;letter-spacing:2px;text-transform:uppercase;
  color:var(--gold3);margin-bottom:30px;animation:rise .9s .08s ease both;
  box-shadow:0 0 20px rgba(232,184,48,.08);
}
.hero-tagline{
  font-family:'Cormorant Garamond',serif;
  font-size:clamp(13px,2.2vw,18px);font-style:italic;
  color:rgba(240,228,192,.25);letter-spacing:.5px;
  margin-bottom:16px;animation:rise .9s .12s ease both;
}
.hero-h1{
  font-family:'Cormorant Garamond',serif;
  font-size:clamp(38px,8vw,88px);font-weight:700;
  line-height:.95;color:var(--text);
  margin-bottom:18px;animation:rise .9s .16s ease both;
  text-shadow:0 0 80px rgba(232,184,48,.12);
}
.hero-h1 em{
  display:block;font-style:italic;font-weight:300;
  color:rgba(240,228,192,.3);font-size:.58em;line-height:1.35;
}
.hero-divider{
  width:100px;height:1px;
  background:linear-gradient(90deg,transparent,var(--gold3),transparent);
  margin:26px auto;animation:rise .9s .2s ease both;
}
.hero-desc{
  font-size:clamp(13px,2vw,16px);line-height:2;
  color:rgba(240,228,192,.35);max-width:500px;
  margin:0 auto 48px;animation:rise .9s .24s ease both;
}
.cta-primary{
  display:inline-flex;align-items:center;gap:9px;
  background:linear-gradient(135deg,var(--gold1),var(--gold2),var(--gold3),var(--gold2),var(--gold1));
  background-size:200% auto;
  color:#000;padding:16px 36px;border-radius:50px;
  font-size:14px;font-weight:800;border:none;cursor:pointer;
  font-family:'DM Sans',sans-serif;letter-spacing:.5px;
  box-shadow:0 6px 40px rgba(200,146,13,.4),0 0 0 1px rgba(232,184,48,.2);
  transition:all .3s;animation:shimmer 3s linear infinite;
}
.cta-primary:hover{
  transform:translateY(-4px);
  box-shadow:0 14px 50px rgba(200,146,13,.55),0 0 60px rgba(232,184,48,.2);
}
.hero-cta-group{display:flex;gap:12px;justify-content:center;flex-wrap:wrap;animation:rise .9s .3s ease both;}
.scroll-hint{position:absolute;bottom:32px;left:50%;transform:translateX(-50%);display:flex;flex-direction:column;align-items:center;animation:rise 1s .6s ease both;z-index:2;gap:4px;}
.scroll-dot{width:5px;height:5px;border-radius:50%;background:var(--gold2);animation:scrollBounce 2s infinite;opacity:.4;}

/* ══ SECTIONS BASE ══ */
section, .counter-strip, .timer-strip, .share-sec{
  position:relative;z-index:1;
}

/* ══ MISSION ══ */
.mission{
  padding:90px 24px;
  background:linear-gradient(180deg,rgba(0,0,0,0) 0%,rgba(6,6,10,.97) 5%,rgba(6,6,10,.97) 95%,rgba(0,0,0,0) 100%);
  backdrop-filter:blur(4px);
}
.mission::before{
  content:'';position:absolute;top:0;left:0;right:0;height:1px;
  background:linear-gradient(90deg,transparent,var(--gold2),var(--gold4),var(--gold2),transparent);
}
.mwrap{max-width:800px;margin:0 auto;text-align:center;}
.pillars{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:18px;}
.pillar{
  background:rgba(232,184,48,.03);
  backdrop-filter:blur(16px);
  border-radius:22px;padding:30px 22px;
  border:1px solid rgba(232,184,48,.12);
  text-align:left;transition:all .35s;position:relative;overflow:hidden;
}
.pillar::before{
  content:'';position:absolute;inset:0;
  background:linear-gradient(135deg,rgba(232,184,48,.05),transparent 60%);
  opacity:0;transition:.35s;
}
.pillar::after{
  content:'';position:absolute;
  top:-50%;left:-50%;width:200%;height:200%;
  background:conic-gradient(transparent 0deg,rgba(232,184,48,.03) 30deg,transparent 60deg);
  animation:rotateSlow 20s linear infinite;opacity:0;transition:.3s;
}
.pillar:hover{transform:translateY(-6px);border-color:rgba(232,184,48,.35);box-shadow:0 16px 50px rgba(232,184,48,.08),inset 0 1px 0 rgba(232,184,48,.1);}
.pillar:hover::before{opacity:1;}
.pillar:hover::after{opacity:1;}
.pillar-icon{font-size:34px;margin-bottom:14px;}
.pillar-title{font-family:'Cormorant Garamond',serif;font-size:19px;font-weight:700;color:var(--gold3);margin-bottom:7px;}
.pillar-desc{font-size:12px;color:var(--dim);line-height:1.85;}

/* ══ DONASI FORM ══ */
.donasi-sec{
  padding:90px 24px;
  background:linear-gradient(180deg,rgba(6,6,10,.97),rgba(0,0,0,.98));
}
.donasi-sec::before{
  content:'';position:absolute;top:0;left:0;right:0;height:1px;
  background:linear-gradient(90deg,transparent,var(--gold2),var(--gold4),var(--gold2),transparent);
}
.donasi-sec::after{
  content:'';position:absolute;inset:0;
  background:radial-gradient(ellipse 60% 50% at 50% 0,rgba(232,184,48,.04),transparent);
  pointer-events:none;
}
.dwrap{max-width:560px;margin:0 auto;position:relative;z-index:1;}
.donasi-card{
  background:rgba(10,8,2,.8);
  backdrop-filter:blur(30px);
  border-radius:28px;overflow:hidden;
  border:1px solid rgba(232,184,48,.2);
  box-shadow:
    0 0 80px rgba(232,184,48,.07),
    0 30px 80px rgba(0,0,0,.7),
    inset 0 1px 0 rgba(232,184,48,.1);
  animation:glowRing 5s ease-in-out infinite;
}
.donasi-head{
  background:linear-gradient(135deg,#060400,#140e00,#0a0700);
  padding:30px 28px 26px;text-align:center;
  border-bottom:1px solid rgba(232,184,48,.15);
  position:relative;overflow:hidden;
}
.donasi-head::before{
  content:'';position:absolute;inset:0;
  background:radial-gradient(ellipse 100% 200% at 50% 100%,rgba(232,184,48,.08),transparent);
}
.donasi-head::after{
  content:'';position:absolute;top:0;left:-100%;width:300%;height:1px;
  background:linear-gradient(90deg,transparent,rgba(232,184,48,.4),transparent);
  animation:shimmer 4s linear infinite;
}
.dh-arab{
  font-family:'Amiri',serif;font-size:20px;letter-spacing:2px;margin-bottom:12px;
  background:var(--shimmer);background-size:200% auto;
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;
  background-clip:text;animation:shimmer 5s linear infinite;position:relative;
}
.dh-title{font-family:'Cormorant Garamond',serif;font-size:22px;font-weight:700;color:var(--text);position:relative;}
.dh-sub{font-size:10px;color:var(--ghost);letter-spacing:1px;margin-top:4px;position:relative;}
.donasi-body{padding:32px;background:transparent;}
.field{margin-bottom:18px;}
.field label{display:block;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:1.5px;color:var(--gold2);margin-bottom:7px;}
.field input,.field textarea{
  width:100%;padding:13px 16px;
  border:1px solid rgba(232,184,48,.18);border-radius:12px;
  font-size:14px;font-family:'DM Sans',sans-serif;
  color:var(--text);background:rgba(232,184,48,.03);
  backdrop-filter:blur(10px);transition:all .25s;
}
.field input::placeholder,.field textarea::placeholder{color:rgba(240,228,192,.18);}
.field textarea{height:80px;resize:vertical;}
.field input:focus,.field textarea:focus{
  outline:none;border-color:var(--gold3);
  background:rgba(232,184,48,.06);
  box-shadow:0 0 0 3px rgba(232,184,48,.1),0 0 20px rgba(232,184,48,.08);
}
.paket-label{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:1.5px;color:var(--gold2);margin-bottom:10px;}
.paket-row{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:14px;}
.pil{
  background:rgba(232,184,48,.03);border:1px solid rgba(232,184,48,.15);
  border-radius:12px;padding:13px 6px;text-align:center;cursor:pointer;
  transition:all .25s;backdrop-filter:blur(6px);
}
.pil:hover{border-color:rgba(232,184,48,.45);background:rgba(232,184,48,.08);transform:translateY(-1px);}
.pil.on{
  border-color:var(--gold3);background:rgba(232,184,48,.12);
  box-shadow:0 0 20px rgba(232,184,48,.15),inset 0 1px 0 rgba(232,184,48,.2);
}
.pil-v{font-family:'Cormorant Garamond',serif;font-size:18px;font-weight:700;color:var(--gold3);}
.pil-l{font-size:9px;color:var(--ghost);margin-top:2px;}
.free-row{
  display:flex;align-items:center;gap:8px;
  border:1px solid rgba(232,184,48,.18);border-radius:12px;
  padding:2px 2px 2px 14px;background:rgba(232,184,48,.03);
  backdrop-filter:blur(6px);margin-bottom:18px;
}
.free-pfx{font-size:13px;font-weight:800;color:var(--gold2);}
.free-input{flex:1;padding:11px 8px;border:none;background:transparent;font-size:15px;font-weight:700;font-family:'DM Sans',sans-serif;color:var(--gold3);}
.free-input:focus{outline:none;}
.free-input::placeholder{color:rgba(240,228,192,.18);font-weight:400;}
.opsi-toggle{
  width:100%;background:transparent;border:1px solid rgba(232,184,48,.12);
  border-radius:12px;padding:12px 16px;font-size:12px;font-weight:700;
  color:var(--dim);cursor:pointer;font-family:'DM Sans',sans-serif;
  text-align:left;margin-bottom:10px;transition:all .25s;
  display:flex;justify-content:space-between;align-items:center;
}
.opsi-toggle:hover{border-color:rgba(232,184,48,.3);color:var(--gold3);}
.arr{transition:transform .3s;}
.opsi-toggle.open .arr{transform:rotate(180deg);}
.opsi-panel{display:none;padding:18px;background:rgba(0,0,0,.4);border-radius:14px;margin-bottom:20px;border:1px solid rgba(232,184,48,.1);backdrop-filter:blur(10px);}
.opsi-panel.open{display:block;}
.opsi-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
.opsi-field label{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:1px;color:var(--gold2);margin-bottom:6px;display:block;}
.oselect{width:100%;padding:10px 12px;border:1px solid rgba(232,184,48,.2);border-radius:10px;font-size:12px;font-family:'DM Sans',sans-serif;color:var(--text);background:#0d0d00;}
.opsi-note{font-size:10px;color:var(--ghost);font-style:italic;margin-top:10px;}
.transfer-box{
  background:linear-gradient(135deg,rgba(13,10,0,.9),rgba(20,15,0,.9));
  border:1px solid rgba(232,184,48,.2);border-radius:18px;padding:22px;margin:20px 0;
  backdrop-filter:blur(16px);
  box-shadow:inset 0 1px 0 rgba(232,184,48,.08);
}
.tb-title{
  font-size:10px;font-weight:800;text-transform:uppercase;letter-spacing:2.5px;margin-bottom:16px;
  background:var(--shimmer);background-size:200% auto;
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;
  background-clip:text;animation:shimmer 4s linear infinite;
}
.tb-bank-name{font-size:12px;font-weight:700;color:var(--dim);margin-bottom:4px;}
.tb-bank-num{
  font-family:'Cormorant Garamond',serif;font-size:28px;font-weight:700;
  color:var(--gold3);cursor:pointer;letter-spacing:3px;transition:all .25s;
}
.tb-bank-num:hover{color:var(--gold4);text-shadow:0 0 30px rgba(232,184,48,.5);}
.tb-bank-an{font-size:10px;color:var(--ghost);margin-top:2px;margin-bottom:14px;}
.tb-divider{height:1px;background:rgba(232,184,48,.08);margin:14px 0;}
.ewalet-label{font-size:10px;color:var(--ghost);margin-bottom:10px;}
.ewalet-row{display:flex;gap:8px;flex-wrap:wrap;}
.ewalet{
  flex:1;min-width:80px;
  background:rgba(232,184,48,.04);border:1px solid rgba(232,184,48,.14);
  border-radius:12px;padding:10px 8px;text-align:center;cursor:pointer;
  transition:all .25s;backdrop-filter:blur(8px);
}
.ewalet:hover{border-color:rgba(232,184,48,.38);background:rgba(232,184,48,.09);box-shadow:0 0 20px rgba(232,184,48,.08);}
.ewalet-name{font-size:11px;font-weight:800;color:var(--gold3);}
.ewalet-num{font-size:9px;color:var(--ghost);margin-top:2px;}
.wa-btn{
  width:100%;background:linear-gradient(135deg,#056040,#0a9060);color:white;
  border:none;border-radius:14px;padding:15px;font-size:15px;font-weight:800;
  cursor:pointer;font-family:'DM Sans',sans-serif;margin-bottom:10px;
  transition:all .3s;box-shadow:0 4px 24px rgba(5,96,64,.45);
}
.wa-btn:hover{transform:translateY(-2px);box-shadow:0 8px 32px rgba(5,96,64,.55);}
.sertif-link{
  width:100%;background:transparent;
  border:1px solid rgba(232,184,48,.25);color:var(--gold2);
  border-radius:14px;padding:12px;font-size:13px;font-weight:700;
  cursor:pointer;font-family:'DM Sans',sans-serif;transition:all .3s;
}
.sertif-link:hover{border-color:var(--gold3);color:var(--gold3);background:rgba(232,184,48,.05);}

/* ══ COUNTER ══ */
.counter-strip{
  padding:36px 24px;
  background:linear-gradient(135deg,rgba(10,8,0,.95),rgba(5,5,0,.98));
  border-top:1px solid rgba(232,184,48,.18);
  border-bottom:1px solid rgba(232,184,48,.18);
  backdrop-filter:blur(20px);
}
.counter-strip::before{
  content:'';position:absolute;inset:0;
  background:radial-gradient(ellipse 80% 100% at 50% 50%,rgba(232,184,48,.04),transparent);
}
.counter-inner{max-width:800px;margin:0 auto;display:flex;justify-content:center;flex-wrap:wrap;position:relative;}
.ctr-item{flex:1;min-width:130px;text-align:center;padding:18px 20px;position:relative;}
.ctr-item+.ctr-item::before{content:'';position:absolute;left:0;top:15%;height:70%;width:1px;background:rgba(232,184,48,.12);}
.ctr-val{
  font-family:'Cormorant Garamond',serif;font-size:clamp(34px,5vw,54px);font-weight:700;line-height:1;
  background:var(--shimmer);background-size:200% auto;
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;
  background-clip:text;animation:shimmer 4s linear infinite;
}
.ctr-label{font-size:10px;color:var(--ghost);text-transform:uppercase;letter-spacing:2px;margin-top:5px;}

/* ══ COUNTDOWN ══ */
.timer-strip{
  padding:30px 24px;
  background:linear-gradient(135deg,rgba(5,4,0,.98),rgba(8,7,0,.98));
  border-bottom:1px solid rgba(232,184,48,.12);
  backdrop-filter:blur(20px);
}
.timer-inner{max-width:680px;margin:0 auto;text-align:center;}
.timer-label{font-size:10px;color:var(--ghost);text-transform:uppercase;letter-spacing:2px;margin-bottom:18px;}
.timer-boxes{display:flex;gap:10px;justify-content:center;flex-wrap:wrap;}
.tbox{
  background:rgba(232,184,48,.04);
  border:1px solid rgba(232,184,48,.22);
  backdrop-filter:blur(12px);
  border-radius:16px;padding:16px 20px;min-width:76px;text-align:center;
  box-shadow:0 0 30px rgba(232,184,48,.06),inset 0 1px 0 rgba(232,184,48,.08);
}
