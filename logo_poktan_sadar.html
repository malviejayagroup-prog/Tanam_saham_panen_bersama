<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Logo Kelompok Tani Sadar</title>
<link href="https://fonts.googleapis.com/css2?family=Amiri:wght@400;700&family=Cormorant+Garamond:ital,wght@0,400;0,700;1,400&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{background:#1a1a1a;display:flex;flex-direction:column;align-items:center;padding:32px 16px;gap:32px;font-family:sans-serif;}

.label{color:rgba(255,255,255,.4);font-size:11px;letter-spacing:.2em;text-transform:uppercase;text-align:center;margin-bottom:8px;}

.card{background:#111;border-radius:20px;padding:24px;display:flex;flex-direction:column;align-items:center;gap:12px;max-width:500px;width:100%;}

.btn-dl{
  background:linear-gradient(135deg,#2d6a3f,#1a4d2e);
  color:#f5edd0;border:none;border-radius:50px;
  padding:12px 28px;font-size:13px;font-weight:700;
  cursor:pointer;letter-spacing:.05em;
  transition:all .3s;box-shadow:0 4px 16px rgba(45,106,63,.4);
}
.btn-dl:hover{transform:translateY(-2px);box-shadow:0 8px 24px rgba(45,106,63,.5);}

canvas{border-radius:12px;max-width:100%;}
</style>
</head>
<body>

<!-- ══ LOGO UTAMA ══ -->
<div class="label">Logo Utama — Untuk Header & Profil</div>
<div class="card">
  <canvas id="logo1" width="800" height="800"></canvas>
  <button class="btn-dl" onclick="dl('logo1','logo-poktan-sadar-square.png')">⬇️ Download Logo Square</button>
</div>

<!-- ══ GAMBAR SHARE WA (1200x630) ══ -->
<div class="label">Gambar Share WhatsApp / Open Graph (1200×630)</div>
<div class="card">
  <canvas id="logo2" width="1200" height="630"></canvas>
  <button class="btn-dl" onclick="dl('logo2','share-poktan-sadar-wa.png')">⬇️ Download Gambar Share WA</button>
</div>

<!-- ══ LOGO HORIZONTAL ══ -->
<div class="label">Logo Horizontal — Untuk Dokumen & Header Website</div>
<div class="card">
  <canvas id="logo3" width="900" height="300"></canvas>
  <button class="btn-dl" onclick="dl('logo3','logo-poktan-sadar-horizontal.png')">⬇️ Download Logo Horizontal</button>
</div>

<!-- ══ STEMPEL / CAP BUNDAR ══ -->
<div class="label">Stempel Bundar — Untuk Dokumen Resmi</div>
<div class="card">
  <canvas id="logo4" width="600" height="600"></canvas>
  <button class="btn-dl" onclick="dl('logo4','stempel-poktan-sadar.png')">⬇️ Download Stempel</button>
</div>

<script>
// ══════════════════════════════════
// HELPER FUNCTIONS
// ══════════════════════════════════
function goldGrad(ctx, x1,y1,x2,y2) {
  var g = ctx.createLinearGradient(x1,y1,x2,y2);
  g.addColorStop(0,'#7a5000');
  g.addColorStop(0.3,'#c8a040');
  g.addColorStop(0.5,'#f0d060');
  g.addColorStop(0.7,'#c8a040');
  g.addColorStop(1,'#7a5000');
  return g;
}

function hijauGrad(ctx, x,y,r) {
  var g = ctx.createRadialGradient(x,y*0.4,r*0.1,x,y,r);
  g.addColorStop(0,'#2d6a3f');
  g.addColorStop(0.5,'#1a4d2e');
  g.addColorStop(1,'#0f2d1a');
  return g;
}

function drawStar(ctx, cx,cy,r,n,fill) {
  ctx.beginPath();
  for(var i=0;i<n*2;i++){
    var angle = (i*Math.PI/n) - Math.PI/2;
    var rad = i%2===0 ? r : r*0.45;
    ctx.lineTo(cx+rad*Math.cos(angle), cy+rad*Math.sin(angle));
  }
  ctx.closePath();
  ctx.fillStyle=fill; ctx.fill();
}

function drawLeaf(ctx,cx,cy,size,angle,color) {
  ctx.save();
  ctx.translate(cx,cy);
  ctx.rotate(angle);
  ctx.beginPath();
  ctx.moveTo(0,-size);
  ctx.bezierCurveTo(size*0.6,-size*0.5, size*0.8,size*0.3, 0,size);
  ctx.bezierCurveTo(-size*0.8,size*0.3, -size*0.6,-size*0.5, 0,-size);
  ctx.closePath();
  ctx.fillStyle=color; ctx.fill();
  // vena tengah
  ctx.beginPath();
  ctx.moveTo(0,-size*0.9);
  ctx.lineTo(0,size*0.9);
  ctx.strokeStyle='rgba(255,255,255,0.15)';
  ctx.lineWidth=size*0.06;
  ctx.stroke();
  ctx.restore();
}

function drawMountain(ctx,cx,cy,w,h,color) {
  ctx.beginPath();
  ctx.moveTo(cx-w/2,cy+h);
  ctx.lineTo(cx,cy);
  ctx.lineTo(cx+w/2,cy+h);
  ctx.closePath();
  ctx.fillStyle=color; ctx.fill();
}

function circleText(ctx, text, cx, cy, r, startAngle, fontSize, color, spacing) {
  ctx.save();
  ctx.font = `700 ${fontSize}px "DM Mono", monospace`;
  ctx.fillStyle = color;
  ctx.letterSpacing = '0px';
  var chars = text.split('');
  var totalAngle = spacing * (chars.length - 1);
  var start = startAngle - totalAngle/2;
  chars.forEach(function(ch, i) {
    var angle = start + spacing*i;
    ctx.save();
    ctx.translate(cx + r*Math.cos(angle), cy + r*Math.sin(angle));
    ctx.rotate(angle + Math.PI/2);
    ctx.fillText(ch, -ctx.measureText(ch).width/2, 0);
    ctx.restore();
  });
  ctx.restore();
}

// ══════════════════════════════════
// LOGO 1 — SQUARE (800x800)
// ══════════════════════════════════
(function(){
  var c = document.getElementById('logo1');
  var ctx = c.getContext('2d');
  var W=800, H=800, cx=400, cy=400;

  // Background
  var bgG = ctx.createRadialGradient(cx,cy*0.6,80,cx,cy,420);
  bgG.addColorStop(0,'#1a4d2e');
  bgG.addColorStop(0.6,'#0f2d1a');
  bgG.addColorStop(1,'#070f08');
  ctx.fillStyle=bgG;
  ctx.roundRect(0,0,W,H,40); ctx.fill();

  // Lingkaran emas luar
  ctx.beginPath(); ctx.arc(cx,cy,340,0,Math.PI*2);
  ctx.strokeStyle='rgba(200,160,64,.3)'; ctx.lineWidth=2; ctx.stroke();
  ctx.beginPath(); ctx.arc(cx,cy,320,0,Math.PI*2);
  ctx.strokeStyle='rgba(200,160,64,.15)'; ctx.lineWidth=1; ctx.stroke();

  // Ornamen bintang di sekeliling (12 bintang kecil)
  for(var i=0;i<12;i++){
    var a = (i/12)*Math.PI*2 - Math.PI/2;
    var bx = cx + 335*Math.cos(a), by = cy + 335*Math.sin(a);
    drawStar(ctx, bx,by,6,4,'rgba(240,208,96,.5)');
  }

  // Dedaunan dekoratif (6 daun)
  var leafAngles = [0, Math.PI/3, 2*Math.PI/3, Math.PI, 4*Math.PI/3, 5*Math.PI/3];
  leafAngles.forEach(function(a,i){
    var lx = cx + 220*Math.cos(a-Math.PI/2);
    var ly = cy + 220*Math.sin(a-Math.PI/2);
    drawLeaf(ctx, lx, ly, 36, a, i%2===0?'rgba(45,106,63,.8)':'rgba(26,77,46,.6)');
  });

  // Gunung (3 puncak)
  // bayangan
  ctx.globalAlpha=0.3;
  drawMountain(ctx, cx-80, cy+60, 280, 200, '#0a1a0d');
  ctx.globalAlpha=1;
  // gunung belakang kiri
  drawMountain(ctx, cx-70, cy+60, 260, 190, '#1a4d2e');
  // gunung belakang kanan
  drawMountain(ctx, cx+70, cy+60, 260, 175, '#163d24');
  // gunung utama tengah
  var mtnG = ctx.createLinearGradient(cx,cy-140,cx,cy+60);
  mtnG.addColorStop(0,'#2d7a45');
  mtnG.addColorStop(1,'#1a4d2e');
  drawMountain(ctx, cx, cy+60, 300, 210, mtnG);
  // salju/cahaya puncak
  ctx.beginPath();
  ctx.moveTo(cx,cy-150);
  ctx.lineTo(cx-40,cy-80);
  ctx.lineTo(cx+40,cy-80);
  ctx.closePath();
  ctx.fillStyle='rgba(240,248,240,0.15)'; ctx.fill();

  // Padi di kiri dan kanan gunung
  function drawPadi(ctx, x, y, tinggi, arah) {
    ctx.save();
    ctx.translate(x,y);
    // batang
    ctx.beginPath();
    ctx.moveTo(0,0); ctx.lineTo(arah*8,-tinggi);
    ctx.strokeStyle='rgba(200,160,64,.7)'; ctx.lineWidth=2.5; ctx.stroke();
    // butir-butir
    for(var i=0;i<6;i++){
      var py = -tinggi*0.3 - i*(tinggi*0.1);
      var px = arah*8 - i*(arah*1.5);
      ctx.beginPath();
      ctx.ellipse(px,py, 4,7, arah*0.4, 0, Math.PI*2);
      ctx.fillStyle='rgba(240,208,96,.8)'; ctx.fill();
    }
    ctx.restore();
  }
  for(var p=0;p<5;p++){
    drawPadi(ctx, cx-160+p*10, cy+50, 80+p*5, -1);
    drawPadi(ctx, cx+160-p*10, cy+50, 80+p*5, 1);
  }

  // Air/sungai di bawah
  ctx.beginPath();
  ctx.moveTo(cx-180,cy+60);
  ctx.bezierCurveTo(cx-60,cy+30, cx+60,cy+80, cx+180,cy+55);
  ctx.strokeStyle='rgba(100,180,220,.3)'; ctx.lineWidth=4; ctx.stroke();
  ctx.beginPath();
  ctx.moveTo(cx-160,cy+75);
  ctx.bezierCurveTo(cx-40,cy+50, cx+80,cy+90, cx+170,cy+70);
  ctx.strokeStyle='rgba(100,180,220,.2)'; ctx.lineWidth=3; ctx.stroke();

  // Lingkaran tengah (badge)
  var badgeR = 145;
  var badgeG = ctx.createRadialGradient(cx,cy-20,20,cx,cy-20,badgeR);
  badgeG.addColorStop(0,'rgba(45,106,63,.4)');
  badgeG.addColorStop(1,'rgba(10,25,14,.6)');
  ctx.beginPath(); ctx.arc(cx,cy-20,badgeR,0,Math.PI*2);
  ctx.fillStyle=badgeG; ctx.fill();
  ctx.beginPath(); ctx.arc(cx,cy-20,badgeR,0,Math.PI*2);
  ctx.strokeStyle=goldGrad(ctx,cx-badgeR,cy-20,cx+badgeR,cy-20);
  ctx.lineWidth=2.5; ctx.stroke();

  // Teks POKTAN di atas
  ctx.font='bold 26px "DM Mono", monospace';
  ctx.fillStyle=goldGrad(ctx,cx-80,cy-120,cx+80,cy-100);
  ctx.textAlign='center';
  ctx.fillText('KELOMPOK TANI', cx, cy-110);

  // Teks SADAR - besar di tengah
  ctx.font='bold 88px "Cormorant Garamond", Georgia, serif';
  var sadarG = goldGrad(ctx,cx-140,cy-60,cx+140,cy-60);
  ctx.fillStyle=sadarG;
  ctx.textAlign='center';
  ctx.fillText('SADAR', cx, cy-40);

  // Garis emas bawah SADAR
  var lineG = ctx.createLinearGradient(cx-120,0,cx+120,0);
  lineG.addColorStop(0,'transparent');
  lineG.addColorStop(0.5,'rgba(240,208,96,.8)');
  lineG.addColorStop(1,'transparent');
  ctx.fillStyle=lineG;
  ctx.fillRect(cx-120,cy-22,240,2);

  // Teks Arab Sunda
  ctx.font='italic 20px "Amiri", serif';
  ctx.fillStyle='rgba(240,208,96,.65)';
  ctx.fillText('جاگا ڠارِيکسا لِيۏوڠ', cx, cy+14);

  // Teks bawah
  ctx.font='500 15px "DM Mono", monospace';
  ctx.fillStyle='rgba(240,208,96,.5)';
  ctx.fillText('DESA GUNUNGGURUH · KAB. SUKABUMI', cx, cy+42);

  // SK badge
  ctx.font='500 12px "DM Mono", monospace';
  ctx.fillStyle='rgba(240,208,96,.35)';
  ctx.fillText('SK NO. 141.1/18/XI/2021', cx, cy+64);

  // Teks bawah luar lingkaran
  ctx.font='700 18px "DM Mono", monospace';
  ctx.fillStyle='rgba(240,208,96,.7)';
  ctx.textAlign='center';
  ctx.fillText('SADAR BERTANI · SADAR JAGA NGARIKSA LEWEUNG', cx, cy+270);

  ctx.font='italic 15px "Cormorant Garamond", serif';
  ctx.fillStyle='rgba(240,208,96,.45)';
  ctx.fillText('Jawa Barat · Indonesia · Est. 2021', cx, cy+300);

  // Bintang di bawah teks
  [cx-80, cx, cx+80].forEach(function(bx){
    drawStar(ctx, bx, cy+320, 5, 5, 'rgba(240,208,96,.4)');
  });
})();

// ══════════════════════════════════
// LOGO 2 — SHARE WA (1200x630)
// ══════════════════════════════════
(function(){
  var c = document.getElementById('logo2');
  var ctx = c.getContext('2d');
  var W=1200, H=630;

  // BG gradient
  var bg = ctx.createLinearGradient(0,0,W,H);
  bg.addColorStop(0,'#070f08');
  bg.addColorStop(0.4,'#0f2d1a');
  bg.addColorStop(0.7,'#1a4d2e');
  bg.addColorStop(1,'#070f08');
  ctx.fillStyle=bg; ctx.fillRect(0,0,W,H);

  // Overlay pattern
  for(var i=0;i<W;i+=60){
    ctx.beginPath();
    ctx.moveTo(i,0); ctx.lineTo(i,H);
    ctx.strokeStyle='rgba(45,106,63,0.06)'; ctx.lineWidth=1; ctx.stroke();
  }
  for(var j=0;j<H;j+=60){
    ctx.beginPath();
    ctx.moveTo(0,j); ctx.lineTo(W,j);
    ctx.strokeStyle='rgba(45,106,63,0.06)'; ctx.lineWidth=1; ctx.stroke();
  }

  // Glow kiri
  var glow1 = ctx.createRadialGradient(200,315,20,200,315,300);
  glow1.addColorStop(0,'rgba(45,106,63,0.25)'); glow1.addColorStop(1,'transparent');
  ctx.fillStyle=glow1; ctx.fillRect(0,0,W,H);

  // Glow kanan
  var glow2 = ctx.createRadialGradient(1000,315,20,1000,315,280);
  glow2.addColorStop(0,'rgba(200,160,64,0.1)'); glow2.addColorStop(1,'transparent');
  ctx.fillStyle=glow2; ctx.fillRect(0,0,W,H);

  // Garis emas atas dan bawah
  var lineW = ctx.createLinearGradient(0,0,W,0);
  lineW.addColorStop(0,'transparent');
  lineW.addColorStop(0.3,'rgba(240,208,96,.6)');
  lineW.addColorStop(0.7,'rgba(240,208,96,.6)');
  lineW.addColorStop(1,'transparent');
  ctx.fillStyle=lineW; ctx.fillRect(0,0,W,4);
  ctx.fillRect(0,H-4,W,4);

  // Garis emas kiri dan kanan
  var lineH = ctx.createLinearGradient(0,0,0,H);
  lineH.addColorStop(0,'transparent');
  lineH.addColorStop(0.3,'rgba(240,208,96,.4)');
  lineH.addColorStop(0.7,'rgba(240,208,96,.4)');
  lineH.addColorStop(1,'transparent');
  ctx.fillStyle=lineH; ctx.fillRect(0,0,4,H);
  ctx.fillRect(W-4,0,4,H);

  // Gunung kiri (dekoratif)
  ctx.globalAlpha=0.4;
  drawMountain(ctx, 160, 500, 380, 280, '#1a4d2e');
  drawMountain(ctx, 120, 500, 300, 260, '#163d24');
  ctx.globalAlpha=1;

  // Gunung kanan (dekoratif)
  ctx.globalAlpha=0.3;
  drawMountain(ctx, 1040, 500, 380, 280, '#1a4d2e');
  drawMountain(ctx, 1080, 500, 300, 260, '#163d24');
  ctx.globalAlpha=1;

  // Padi dekoratif
  function drawPadiShare(ctx,x,y,h,d){
    ctx.save(); ctx.translate(x,y);
    ctx.beginPath(); ctx.moveTo(0,0); ctx.lineTo(d*6,-h);
    ctx.strokeStyle='rgba(200,160,64,.5)'; ctx.lineWidth=2; ctx.stroke();
    for(var i=0;i<5;i++){
      var py=-h*0.3-i*(h*0.12);
      var px=d*6-i*(d*1.2);
      ctx.beginPath();
      ctx.ellipse(px,py,3.5,6,d*0.4,0,Math.PI*2);
      ctx.fillStyle='rgba(240,208,96,.6)'; ctx.fill();
    }
    ctx.restore();
  }
  for(var pp=0;pp<8;pp++){
    drawPadiShare(ctx,60+pp*20,520,100+pp*8,-1);
    drawPadiShare(ctx,1140-pp*20,520,100+pp*8,1);
  }

  // Konten tengah
  var cx=600, cy=315;

  // Ornamen bunga/mandala tipis
  for(var i=0;i<8;i++){
    var a=(i/8)*Math.PI*2;
    ctx.save();
    ctx.translate(cx+230*Math.cos(a), cy+230*Math.sin(a));
    ctx.rotate(a);
    ctx.beginPath();
    ctx.ellipse(0,0,8,20,0,0,Math.PI*2);
    ctx.fillStyle='rgba(200,160,64,.08)'; ctx.fill();
    ctx.restore();
  }

  // Badge atas
  ctx.beginPath();
  ctx.roundRect(cx-220,cy-240,440,36,18);
  ctx.fillStyle='rgba(45,106,63,.35)'; ctx.fill();
  ctx.strokeStyle='rgba(200,160,64,.3)'; ctx.lineWidth=1.5; ctx.stroke();
  ctx.font='700 13px "DM Mono", monospace';
  ctx.fillStyle='rgba(240,208,96,.7)';
  ctx.textAlign='center';
  ctx.fillText('✦  KELOMPOK TANI RESMI  ·  SK NO. 141.1/18/XI/2021  ✦', cx, cy-216);

  // SADAR — teks utama besar
  ctx.font='bold 130px "Cormorant Garamond", Georgia, serif';
  var sadarG2 = goldGrad(ctx,cx-200,cy-140,cx+200,cy-140);
  ctx.fillStyle=sadarG2;
  ctx.textAlign='center';
  ctx.shadowColor='rgba(200,160,64,0.3)';
  ctx.shadowBlur=30;
  ctx.fillText('SADAR', cx, cy-80);
  ctx.shadowBlur=0;

  // Garis bawah SADAR
  ctx.fillStyle=goldGrad(ctx,cx-200,0,cx+200,0);
  ctx.fillRect(cx-200,cy-54,400,3);

  // Sub teks
  ctx.font='700 22px "DM Mono", monospace';
  ctx.fillStyle='rgba(240,208,96,.6)';
  ctx.fillText('KELOMPOK TANI', cx, cy-20);

  // Arab Sunda
  ctx.font='italic 24px "Amiri", serif';
  ctx.fillStyle='rgba(240,208,96,.55)';
  ctx.fillText('جاگا ڠارِيکسا لِيۏوڠ', cx, cy+24);

  // Tagline utama
  ctx.font='italic 26px "Cormorant Garamond", serif';
  ctx.fillStyle='rgba(240,230,200,.8)';
  ctx.fillText('"Sadar Bertani, Sadar Jaga Ngariksa Leweung Jeung Lingkungan"', cx, cy+72);

  // Lokasi & SK
  ctx.font='500 16px "DM Mono", monospace';
  ctx.fillStyle='rgba(200,160,64,.45)';
  ctx.fillText('DESA GUNUNGGURUH  ·  KEC. GUNUNGGURUH  ·  KAB. SUKABUMI  ·  JAWA BARAT', cx, cy+112);

  // Kontak
  ctx.font='500 15px "DM Mono", monospace';
  ctx.fillStyle='rgba(200,160,64,.35)';
  ctx.fillText('📱 083871666136  ·  🏦 Mandiri 1820016298168', cx, cy+144);

  // Bintang dekoratif
  [cx-300,cx-160,cx,cx+160,cx+300].forEach(function(bx){
    drawStar(ctx,bx,cy+185,5,5,'rgba(240,208,96,.3)');
  });

  // Daun dekoratif pojok
  drawLeaf(ctx,80,80,45,Math.PI*0.15,'rgba(45,106,63,.5)');
  drawLeaf(ctx,120,60,30,Math.PI*0.05,'rgba(45,106,63,.35)');
  drawLeaf(ctx,W-80,80,45,Math.PI*0.85,'rgba(45,106,63,.5)');
  drawLeaf(ctx,W-120,60,30,Math.PI*0.95,'rgba(45,106,63,.35)');
  drawLeaf(ctx,80,H-80,45,-Math.PI*0.15,'rgba(45,106,63,.4)');
  drawLeaf(ctx,W-80,H-80,45,-Math.PI*0.85,'rgba(45,106,63,.4)');
})();

// ══════════════════════════════════
// LOGO 3 — HORIZONTAL (900x300)
// ══════════════════════════════════
(function(){
  var c = document.getElementById('logo3');
  var ctx = c.getContext('2d');
  var W=900, H=300;

  // BG
  var bg = ctx.createLinearGradient(0,0,W,H);
  bg.addColorStop(0,'#070f08');
  bg.addColorStop(0.5,'#0f2d1a');
  bg.addColorStop(1,'#070f08');
  ctx.fillStyle=bg;
  ctx.roundRect(0,0,W,H,20); ctx.fill();

  // Garis border emas
  ctx.strokeStyle='rgba(200,160,64,.2)';
  ctx.lineWidth=1.5;
  ctx.roundRect(6,6,W-12,H-12,16); ctx.stroke();

  // Ikon kiri — emblem bulat
  var ex=150, ey=150, er=100;
  var eG = ctx.createRadialGradient(ex,ey*0.7,10,ex,ey,er);
  eG.addColorStop(0,'#2d6a3f'); eG.addColorStop(1,'#0f2d1a');
  ctx.beginPath(); ctx.arc(ex,ey,er,0,Math.PI*2);
  ctx.fillStyle=eG; ctx.fill();
  ctx.beginPath(); ctx.arc(ex,ey,er,0,Math.PI*2);
  ctx.strokeStyle=goldGrad(ctx,ex-er,ey,ex+er,ey);
  ctx.lineWidth=2; ctx.stroke();

  // Gunung mini di emblem
  ctx.globalAlpha=0.4;
  drawMountain(ctx,ex-15,ey+30,120,90,'#1a4d2e');
  ctx.globalAlpha=1;
  var mG=ctx.createLinearGradient(ex,ey-60,ex,ey+30);
  mG.addColorStop(0,'#3d8a54'); mG.addColorStop(1,'#1a4d2e');
  drawMountain(ctx,ex,ey+30,140,100,mG);

  // Padi mini
  for(var p=0;p<4;p++){
    var px=ex-55+p*10, py=ey+25;
    ctx.beginPath(); ctx.moveTo(px,py); ctx.lineTo(px-4,-75+py);
    ctx.strokeStyle='rgba(200,160,64,.6)'; ctx.lineWidth=1.5; ctx.stroke();
    ctx.beginPath(); ctx.ellipse(px-4,py-50,3,5,-.3,0,Math.PI*2);
    ctx.fillStyle='rgba(240,208,96,.7)'; ctx.fill();
    var qx=ex+55-p*10;
    ctx.beginPath(); ctx.moveTo(qx,py); ctx.lineTo(qx+4,-75+py);
    ctx.strokeStyle='rgba(200,160,64,.6)'; ctx.lineWidth=1.5; ctx.stroke();
    ctx.beginPath(); ctx.ellipse(qx+4,py-50,3,5,.3,0,Math.PI*2);
    ctx.fillStyle='rgba(240,208,96,.7)'; ctx.fill();
  }

  // Teks kanan
  ctx.textAlign='left';
  var tx=280;

  ctx.font='700 12px "DM Mono", monospace';
  ctx.fillStyle='rgba(240,208,96,.5)';
  ctx.fillText('KELOMPOK TANI', tx, 95);

  ctx.font='bold 80px "Cormorant Garamond", Georgia, serif';
  ctx.fillStyle=goldGrad(ctx,tx,110,tx+380,110);
  ctx.fillText('SADAR', tx, 175);

  // Garis
  var gl=ctx.createLinearGradient(tx,0,tx+380,0);
  gl.addColorStop(0,'rgba(240,208,96,.8)');
  gl.addColorStop(1,'transparent');
  ctx.fillStyle=gl; ctx.fillRect(tx,182,380,2);

  ctx.font='500 13px "DM Mono", monospace';
  ctx.fillStyle='rgba(240,208,96,.45)';
  ctx.fillText('Desa Gunungguruh, Kab. Sukabumi  ·  SK No. 141.1/18/XI/2021', tx, 210);

  ctx.font='italic 15px "Cormorant Garamond", serif';
  ctx.fillStyle='rgba(240,230,200,.5)';
  ctx.fillText('"Sadar Bertani, Sadar Jaga Ngariksa Leweung"', tx, 238);

  ctx.font='500 12px "DM Mono", monospace';
  ctx.fillStyle='rgba(200,160,64,.35)';
  ctx.fillText('083871666136  ·  🌿 Jawa Barat, Indonesia', tx, 262);
})();

// LOGO 4 — STEMPEL BUNDAR (600x600)
// ══════════════════════════════════
(function(){
  var c = document.getElementById('logo4');
  var ctx = c.getContext('2d');
  var W=600, H=600, cx=300, cy=300, R=260;

  // BG transparan (putih untuk cetak)
  ctx.fillStyle='rgba(255,255,255,0)';
  ctx.fillRect(0,0,W,H);

  // Lingkaran luar tebal
  ctx.beginPath(); ctx.arc(cx,cy,R,0,Math.PI*2);
  ctx.strokeStyle='#1a4d2e'; ctx.lineWidth=8; ctx.stroke();

  // Lingkaran dalam
  ctx.beginPath(); ctx.arc(cx,cy,R-18,0,Math.PI*2);
  ctx.strokeStyle='#1a4d2e'; ctx.lineWidth=3; ctx.stroke();

  // Bintang-bintang di antara dua lingkaran (8 bintang)
  for(var i=0;i<8;i++){
    var a=(i/8)*Math.PI*2-Math.PI/2;
    drawStar(ctx, cx+(R-9)*Math.cos(a), cy+(R-9)*Math.sin(a), 7, 5, '#1a4d2e');
  }

  // Teks melingkar atas — KELOMPOK TANI SADAR
  ctx.font='bold 22px "DM Mono", monospace';
  ctx.fillStyle='#1a4d2e';
  ctx.textAlign='center';
  var tR = R-36;
  var teks1 = 'KELOMPOK TANI "SADAR"';
  var charCount1 = teks1.length;
  var totalArc1 = Math.PI * 1.05;
  var startA1 = -Math.PI/2 - totalArc1/2;
  teks1.split('').forEach(function(ch,i){
    var a = startA1 + (i/(charCount1-1))*totalArc1;
    ctx.save();
    ctx.translate(cx+tR*Math.cos(a), cy+tR*Math.sin(a));
    ctx.rotate(a+Math.PI/2);
    ctx.fillText(ch,0,0);
    ctx.restore();
  });

  // Teks melingkar bawah — DESA GUNUNGGURUH KAB SUKABUMI
  var teks2 = 'DESA GUNUNGGURUH · KAB. SUKABUMI · JABAR';
  var charCount2 = teks2.length;
  var totalArc2 = Math.PI * 1.08;
  var startA2 = Math.PI/2 - totalArc2/2;
  ctx.font='bold 16px "DM Mono", monospace';
  teks2.split('').forEach(function(ch,i){
    var a = startA2 + (i/(charCount2-1))*totalArc2;
    ctx.save();
    ctx.translate(cx+tR*Math.cos(a), cy+tR*Math.sin(a));
    ctx.rotate(a+Math.PI/2+Math.PI);
    ctx.fillText(ch,0,0);
    ctx.restore();
  });

  // Gunung tengah
  ctx.globalAlpha=0.15;
  drawMountain(ctx,cx-30,cy+50,200,150,'#1a4d2e');
  ctx.globalAlpha=1;
  drawMountain(ctx,cx-30,cy+50,200,150,'#1a4d2e');

  var mG2=ctx.createLinearGradient(cx,cy-100,cx,cy+50);
  mG2.addColorStop(0,'#2d7a45'); mG2.addColorStop(1,'#1a4d2e');
  ctx.globalAlpha=0.85;
  drawMountain(ctx,cx,cy+50,220,160,mG2);
  ctx.globalAlpha=1;

  // Padi kiri kanan
  for(var pp=0;pp<5;pp++){
    var px=cx-120+pp*14, py=cy+44;
    ctx.beginPath(); ctx.moveTo(px,py); ctx.lineTo(px-5,-90+py);
    ctx.strokeStyle='#1a4d2e'; ctx.lineWidth=2; ctx.stroke();
    ctx.beginPath(); ctx.ellipse(px-5,py-60,4,7,-.3,0,Math.PI*2);
    ctx.fillStyle='#1a4d2e'; ctx.fill();
    var qx=cx+120-pp*14;
    ctx.beginPath(); ctx.moveTo(qx,py); ctx.lineTo(qx+5,-90+py);
    ctx.strokeStyle='#1a4d2e'; ctx.lineWidth=2; ctx.stroke();
    ctx.beginPath(); ctx.ellipse(qx+5,py-60,4,7,.3,0,Math.PI*2);
    ctx.fillStyle='#1a4d2e'; ctx.fill();
  }

  // Teks SADAR
  ctx.font='bold 72px "Cormorant Garamond", Georgia, serif';
  ctx.fillStyle='#1a4d2e';
  ctx.textAlign='center';
  ctx.fillText('SADAR', cx, cy-20);

  // Garis bawah SADAR
  ctx.fillStyle='#1a4d2e';
  ctx.fillRect(cx-80,cy-4,160,2.5);

  // SK
  ctx.font='bold 13px "DM Mono", monospace';
  ctx.fillStyle='#1a4d2e';
  ctx.fillText('SK No. 141.1/18/XI/2021', cx, cy+20);

  // Bintang bawah
  [cx-40,cx,cx+40].forEach(function(bx){
    drawStar(ctx,bx,cy+50,5,5,'#1a4d2e');
  });
})();

  link.click();
}
