<svg width="1200" height="630" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Background gradient -->
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a4a2e"/>
      <stop offset="50%" style="stop-color:#0f2e1c"/>
      <stop offset="100%" style="stop-color:#1a4a2e"/>
    </linearGradient>
    <!-- Gold gradient -->
    <linearGradient id="gold" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#b8780a"/>
      <stop offset="25%" style="stop-color:#f5d060"/>
      <stop offset="50%" style="stop-color:#fdf0a0"/>
      <stop offset="75%" style="stop-color:#f5d060"/>
      <stop offset="100%" style="stop-color:#b8780a"/>
    </linearGradient>
    <!-- Gold text gradient -->
    <linearGradient id="goldText" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#fff8dc"/>
      <stop offset="40%" style="stop-color:#f5d060"/>
      <stop offset="100%" style="stop-color:#c8962c"/>
    </linearGradient>
    <!-- Glow -->
    <radialGradient id="glow1" cx="50%" cy="0%" r="60%">
      <stop offset="0%" style="stop-color:rgba(201,168,76,0.2)"/>
      <stop offset="100%" style="stop-color:rgba(0,0,0,0)"/>
    </radialGradient>
    <radialGradient id="glow2" cx="0%" cy="100%" r="50%">
      <stop offset="0%" style="stop-color:rgba(45,122,79,0.3)"/>
      <stop offset="100%" style="stop-color:rgba(0,0,0,0)"/>
    </radialGradient>
    <filter id="shadow">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="rgba(0,0,0,0.5)"/>
    </filter>
    <filter id="goldGlow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- BACKGROUND -->
  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#glow1)"/>
  <rect width="1200" height="630" fill="url(#glow2)"/>

  <!-- GRID PATTERN -->
  <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
    <line x1="0" y1="40" x2="40" y2="0" stroke="rgba(201,168,76,0.05)" stroke-width="1"/>
  </pattern>
  <rect width="1200" height="630" fill="url(#grid)"/>

  <!-- OUTER BORDER -->
  <rect x="20" y="20" width="1160" height="590" rx="8" fill="none" stroke="url(#gold)" stroke-width="3"/>
  <rect x="28" y="28" width="1144" height="574" rx="6" fill="none" stroke="rgba(245,208,96,0.3)" stroke-width="1"/>

  <!-- CORNER ORNAMENTS -->
  <!-- TL -->
  <line x1="20" y1="60" x2="20" y2="20" stroke="url(#gold)" stroke-width="4"/>
  <line x1="20" y1="20" x2="60" y2="20" stroke="url(#gold)" stroke-width="4"/>
  <!-- TR -->
  <line x1="1180" y1="60" x2="1180" y2="20" stroke="url(#gold)" stroke-width="4"/>
  <line x1="1180" y1="20" x2="1140" y2="20" stroke="url(#gold)" stroke-width="4"/>
  <!-- BL -->
  <line x1="20" y1="570" x2="20" y2="610" stroke="url(#gold)" stroke-width="4"/>
  <line x1="20" y1="610" x2="60" y2="610" stroke="url(#gold)" stroke-width="4"/>
  <!-- BR -->
  <line x1="1180" y1="570" x2="1180" y2="610" stroke="url(#gold)" stroke-width="4"/>
  <line x1="1180" y1="610" x2="1140" y2="610" stroke="url(#gold)" stroke-width="4"/>

  <!-- LEFT PANEL - LOGO & LEMBAGA -->
  <g transform="translate(80, 80)">

    <!-- LOGO CIRCLE -->
    <circle cx="120" cy="100" r="75" fill="none" stroke="url(#gold)" stroke-width="3"/>
    <circle cx="120" cy="100" r="68" fill="rgba(0,0,0,0.4)" stroke="rgba(245,208,96,0.3)" stroke-width="1"/>
    <!-- Pentagon -->
    <polygon points="120,45 158,68 158,132 82,132 82,68" fill="none" stroke="#c8962c" stroke-width="2.5"/>
    <!-- Crescent -->
    <path d="M120,65 C108,65 100,73 100,83 C100,93 108,101 120,101 C114,101 106,96 106,83 C106,70 114,65 120,65 Z" fill="#f5d060"/>
    <!-- Star -->
    <polygon points="128,62 130,68 136,68 131,72 133,78 128,74 123,78 125,72 120,68 126,68" fill="#fdf0a0"/>
    <!-- Glow ring -->
    <circle cx="120" cy="100" r="75" fill="none" stroke="rgba(245,208,96,0.2)" stroke-width="8"/>

    <!-- MASJID ICON -->
    <text x="120" y="195" text-anchor="middle" font-size="36">🕌</text>

    <!-- LEMBAGA INFO -->
    <text x="120" y="240" text-anchor="middle" font-family="Georgia,serif" font-size="13" fill="rgba(245,208,96,0.7)" letter-spacing="2">MAJELIS TAKLIM</text>
    <text x="120" y="265" text-anchor="middle" font-family="Georgia,serif" font-size="11" fill="rgba(253,240,160,0.5)">Berdiri 2015 · 100+ Jamaah</text>

    <!-- DIVIDER -->
    <line x1="0" y1="285" x2="240" y2="285" stroke="rgba(245,208,96,0.3)" stroke-width="1"/>

    <!-- STATS -->
    <text x="40" y="315" text-anchor="middle" font-family="Georgia,serif" font-size="22" fill="#f5d060" font-weight="bold">100+</text>
    <text x="40" y="332" text-anchor="middle" font-family="sans-serif" font-size="9" fill="rgba(253,240,160,0.5)">JAMAAH</text>

    <line x1="120" y1="298" x2="120" y2="335" stroke="rgba(245,208,96,0.2)" stroke-width="1"/>

    <text x="200" y="315" text-anchor="middle" font-family="Georgia,serif" font-size="22" fill="#f5d060" font-weight="bold">9 Th</text>
    <text x="200" y="332" text-anchor="middle" font-family="sans-serif" font-size="9" fill="rgba(253,240,160,0.5)">BERDIRI</text>

    <!-- LEGAL BADGE -->
    <rect x="10" y="350" width="220" height="36" rx="18" fill="rgba(45,122,79,0.3)" stroke="rgba(245,208,96,0.4)" stroke-width="1"/>
    <text x="120" y="364" text-anchor="middle" font-family="sans-serif" font-size="10" fill="rgba(253,240,160,0.7)">✓ SK KEMENAG KAB. SUKABUMI</text>
    <text x="120" y="378" text-anchor="middle" font-family="sans-serif" font-size="9" fill="rgba(253,240,160,0.5)">No. 976 Tahun 2020</text>

  </g>

  <!-- VERTICAL DIVIDER -->
  <line x1="380" y1="60" x2="380" y2="570" stroke="url(#gold)" stroke-width="1" opacity="0.4"/>

  <!-- RIGHT PANEL - MAIN CONTENT -->
  <g transform="translate(430, 0)">

    <!-- TOP LABEL -->
    <text x="340" y="75" text-anchor="middle" font-family="sans-serif" font-size="12" fill="rgba(245,208,96,0.6)" letter-spacing="4">🤲 AMAL JARIYAH — SUKABUMI</text>

    <!-- MAIN TITLE -->
    <text x="340" y="135" text-anchor="middle" font-family="Georgia,serif" font-size="46" font-weight="bold" fill="url(#goldText)" filter="url(#shadow)">Bantu Wujudkan</text>
    <text x="340" y="190" text-anchor="middle" font-family="Georgia,serif" font-size="46" font-weight="bold" fill="url(#goldText)" filter="url(#shadow)">Rumah Ilmu</text>
    <text x="340" y="230" text-anchor="middle" font-family="Georgia,serif" font-size="28" fill="rgba(255,255,255,0.85)">untuk Umat</text>

    <!-- GOLD DIVIDER -->
    <line x1="90" y1="255" x2="590" y2="255" stroke="url(#gold)" stroke-width="2" opacity="0.6"/>
    <line x1="150" y1="260" x2="530" y2="260" stroke="rgba(245,208,96,0.3)" stroke-width="1"/>

    <!-- NAMA LEMBAGA -->
    <text x="340" y="295" text-anchor="middle" font-family="Georgia,serif" font-size="14" fill="rgba(253,240,160,0.7)" letter-spacing="1">MAJELIS TAKLIM RAUDHOTUL INSAN</text>
    <text x="340" y="316" text-anchor="middle" font-family="sans-serif" font-size="12" fill="rgba(255,255,255,0.5)">Kp. Pasir Ipis, Desa Gunungguruh, Kab. Sukabumi</text>

    <!-- TARGET DONASI BOX -->
    <rect x="60" y="340" width="560" height="100" rx="12" fill="rgba(0,0,0,0.35)" stroke="rgba(245,208,96,0.35)" stroke-width="1.5"/>
    <!-- Shimmer -->
    <rect x="60" y="340" width="560" height="100" rx="12" fill="url(#glow1)" opacity="0.3"/>

    <text x="340" y="372" text-anchor="middle" font-family="sans-serif" font-size="11" fill="rgba(245,208,96,0.6)" letter-spacing="3">TARGET DANA PEMBANGUNAN</text>
    <text x="340" y="415" text-anchor="middle" font-family="Georgia,serif" font-size="42" font-weight="bold" fill="url(#goldText)" filter="url(#goldGlow)">Rp 141.750.000</text>
    <text x="340" y="432" text-anchor="middle" font-family="sans-serif" font-size="10" fill="rgba(253,240,160,0.5)">untuk pembangunan gedung majelis taklim</text>

    <!-- PROGRESS BAR -->
    <rect x="60" y="455" width="560" height="8" rx="4" fill="rgba(255,255,255,0.1)"/>
    <rect x="60" y="455" width="0" height="8" rx="4" fill="url(#gold)"/>

    <!-- CTA -->
    <rect x="150" y="480" width="380" height="52" rx="26" fill="url(#gold)"/>
    <text x="340" y="513" text-anchor="middle" font-family="sans-serif" font-size="18" font-weight="bold" fill="#1a2e00">💛 DONASI SEKARANG</text>

    <!-- URL -->
    <text x="340" y="570" text-anchor="middle" font-family="sans-serif" font-size="11" fill="rgba(245,208,96,0.5)">malviejayagroup-prog.github.io/Donasi-Raudhatul-ihsyan-</text>

  </g>
</svg>
